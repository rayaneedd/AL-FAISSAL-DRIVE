<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & FAQ | Al Faissal Drive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Al Faissal <span>Drive</span></a>
        </div>
    </header>

    <section class="container">
        <div class="checkout-container">
            <div class="checkout-form">
                <h2>Contactez-nous</h2>
                <form style="margin-top: 1rem;">
                    <div class="form-group"><label>Nom</label><input type="text" required></div>
                    <div class="form-group"><label>Email</label><input type="email" required></div>
                    <div class="form-group"><label>Message</label><textarea style="width: 100%; height: 100px; border: 1px solid #ddd;"></textarea></div>
                    <button class="btn btn-accent" style="margin-top: 1rem;">Envoyer</button>
                </form>
            </div>
            <div class="checkout-summary">
                <h3>FAQ Rapide</h3>
                <p><strong>Puis-je louer à l'aéroport ?</strong><br>Oui, nous livrons à Marrakech, Casablanca et Agadir.</p>
                <hr style="margin: 1rem 0; opacity: 0.2;">
                <p><strong>Quel âge pour louer ?</strong><br>Vous devez avoir au moins 21 ans et 2 ans de permis.</p>
            </div>
        </div>
    </section>
</body>
</html>
