<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Flotte | Al Faissal Drive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Al Faissal <span>Drive</span></a>
            <nav class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="fleet.html">Flotte</a>
                <a href="booking.html">Réservation</a>
            </nav>
        </div>
    </header>

    <section class="container">
        <h1 class="text-center section-title">Louez le véhicule idéal</h1>
        
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center; flex-wrap: wrap;">
            <button class="btn btn-outline">Tous</button>
            <button class="btn btn-outline">Économique</button>
            <button class="btn btn-outline">Luxe / SUV</button>
            <button class="btn btn-outline">Automatique</button>

        <div class="fleet-grid">

                <img src="https://images.unsplash.com/photo-1549314488-812328114675?auto=format&fit=crop&w=600&q=80" class="car-img">
                <div class="car-details">
                    <div class="car-title"><h3>Range Rover Velar</h3><span class="car-price">120€/jr</span></div>
                    <div class="car-specs"><span>💺 5 Places</span><span>🕹️ Auto</span></div>
                    <a href="booking.html" class="btn btn-accent" style="width: 100%;">Réserver</a>
                </div>
            </div>
            </div>
    </section>
